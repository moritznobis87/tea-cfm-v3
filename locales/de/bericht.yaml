  Abb. 16: Prognostizierte Verteilung der nächsten Runde – Dichte der
  Zuschlagswerte (am Grenzzuschlag {grenzzuschlag_ct} abgeschnitten),
  gestrichelt die Verteilung aller Gebote, graues Band: P10–P90 der
