# --- Ausschreibungsseite: vollständige Übersetzung ---------------------------------
auktion_intro_titel: "### EAG-Ausschreibungssimulation (Photovoltaik)"
auktion_intro_beschreibung: "Price-Taker-Modell: Geschätzt wird die Gebotsverteilung der übrigen Marktteilnehmer der nächsten Marktprämienausschreibung; das eigene Gebot beeinflusst den Grenzzuschlag nicht und wird anhand der Verteilung gewählt. Mechanismus: Pay-as-Bid mit Gebotspreisreihung (EAG §§ 18 ff., OeMAG)."
auktion_historie_beschreibung: "Runden bis 04/2025 waren unterzeichnet (Höchstzuschlag = Preisobergrenze, Restmengen blieben unbezuschlagt); seit 07/2025 herrscht Wettbewerb: Der Höchstzuschlag löst sich von der Obergrenze, die Zuschlagswerte sinken und verdichten sich – exakt das in der Auktionsliteratur beschriebene Pay-as-Bid-Muster."
auktion_verteilungen_beschreibung: "Da die OeMAG weder Einzelgebote noch Gebotsvolumina veröffentlicht, werden die Verteilungsparameter je Runde aus den Aggregaten (Ø, Minimum) geschätzt. Deutlich sichtbar: In den unterzeichneten Runden (gestrichelt) klebt die Masse an der Preisobergrenze; mit dem Wettbewerb ab 07/2025 wandern die Verteilungen nach links und verdichten sich."
auktion_kalibrierung_titel: "**Kalibrierung je Runde** (gespiegelte Inverse Gamma auf [0, Obergrenze]; Bedingungen: mengengewichteter Ø-Zuschlag und Minimum als 2 %-Quantil; bei überzeichneten Runden ist die Wettbewerbsquote r = Gebotsmenge / ausgeschriebene Menge **latent** und wird aus dem Abstand Grenzzuschlag ↔ Obergrenze rückgeschätzt, da die OeMAG das Gebotsvolumen nicht veröffentlicht):"
auktion_modellwahl_titel: "Modellwahl und Validierung (Backtest)"
auktion_familienvergleich_text: "**Familienvergleich** – da nur Aggregate (Min/Ø/Max) je Runde veröffentlicht werden, scheiden KDE/GMM auf Einzelgeboten aus; verglichen werden auf [0, Obergrenze] beschränkte parametrische Familien. Gewählt ist die **an der Y-Achse gespiegelte, an die Obergrenze verschobene Inverse-Gamma-Verteilung**: Sie passt auf die (prognoserelevanten) Wettbewerbsrunden am besten (Fit-RMSE 0,15 vs. 0,21 der Beta) und hat strukturell exakt die erwartete Form – Dichte an der Obergrenze null, steiler rechter Abfall, langsam auslaufender linker Rand. Die Beta bleibt als Referenz: Sie beschreibt die alten, unterzeichneten Runden mit Masse an der Obergrenze besser (β < 1), die die Inverse Gamma prinzipbedingt nicht abbilden kann; die trunkierte Normalverteilung scheitert als symmetrische Basis an linkem Ausläufer plus Konzentration (Fit-RMSE ~4× höher)."
auktion_backtest_intro: "**Rollierender Ein-Schritt-Backtest** – für jede Wettbewerbsrunde wurde das Modell nur auf den davor liegenden Runden kalibriert (Verankerung an der jeweils letzten Runde, Random Walk) und der Grenzzuschlag prognostiziert; Vergleich mit der naiven Fortschreibung des letzten Höchstzuschlags (bisheriger Ansatz):"
auktion_backtest_hinweis: "RMSE Grenzzuschlag über alle vier Wettbewerbsrunden: Modell 0,60 vs. naiv 0,69 ct/kWh; im stabilen Regime ab 2026: 0,23 vs. 0,36 ct/kWh. Darüber hinaus liefert nur das Modell die volle prädiktive Verteilung des Grenzzuschlags – und damit die Zuschlagswahrscheinlichkeit je Gebot, die ein fester Punktwert prinzipiell nicht hergibt. Die schwächeren Zeilen 2025 markieren den Regimewechsel (Eintritt des Wettbewerbs), den kein rein historisch kalibriertes Verfahren antizipieren konnte."
auktion_grundlage_label: "Grundlage des Zuschlagswerts"
auktion_grundlage_letzte: "Letzte Ausschreibung (gesetzt)"
auktion_grundlage_prognose: "Prognosemodell (nächste Ausschreibung)"
auktion_grundlage_hilfe: "Letzte Ausschreibung: Die Verteilung der letzten Runde gilt unverändert; die Risikoneigung wählt das Quantil der Zuschlagswerte. Prognosemodell: Momentum-Prognose der nächsten Runde – Grenzzuschlag und Ø-Zuschlag werden aus letzter Änderung und Beschleunigung fortgeschrieben, daraus wird die neue Verteilung gebaut."
auktion_preisobergrenze_label: "Preisobergrenze (ct/kWh)"
auktion_preisobergrenze_hilfe: "Per Verordnung fixiert; 2026/2027: 7,77 ct/kWh."
auktion_differenzordnung_label: "Maximale Differenzenordnung"
auktion_differenzordnung_hilfe: "Ordnung 1 = lineare Fortschreibung des letzten Trends; Ordnung 2 berücksichtigt zusätzlich die Änderung des Trends (Beschleunigung); Ordnung 3 deren Änderung. Effektiv begrenzt durch die verfügbaren Wettbewerbsrunden."
auktion_unsicherheit_label: "Unsicherheit des Grenzzuschlags (± ct/kWh)"
auktion_unsicherheit_hilfe: "Streuung um die Punktprognose; Vorbelegung entspricht der Streuung der historischen Rundenänderungen. An der Preisobergrenze trunkiert."
auktion_daempfung_label: "Dämpfung λ{k} (Gewicht der Differenz {k1}. Ordnung)"
auktion_daempfung_hilfe: "λ = 1: volle Fortschreibung der höheren Differenz; λ = 0: die höhere Ordnung wird ignoriert (entspricht der jeweils niedrigeren Ordnung)."
auktion_implizierte_quote: "Implizierte Wettbewerbsquote der gebauten Verteilung: r = {wert} (Anteil bezuschlagter Gebote = 1/r; ergibt sich aus Prognose-Grenzzuschlag, Ø-Prognose und Minimum-Anker)."
auktion_methodik_titel: "Prognosemethodik (Differenzenextrapolation)"
auktion_methodik_intro: "Rekursive Mehrfach-Differenzenextrapolation: Die höchste Differenz bleibt konstant, alle niedrigeren werden rekursiv fortgeschrieben –"
auktion_methodik_erklaerung: "Damit wird nicht nur der aktuelle Trend, sondern auch dessen Veränderung berücksichtigt: Halbiert sich der Rückgang je Runde, erwartet das Verfahren eine weitere Abflachung statt einer konstanten Fortschreibung."
auktion_methodik_ergebnis: "Grenzzuschlag: {maxes_kette} ⇒ **{grenzzuschlag_wert}** · Ø-Zuschlag: {mittels_kette} ⇒ **{mittel_wert}**"
auktion_methodik_schluss: "Das Minimum wird unverändert fortgeschrieben (keine stabile Dynamik in der Historie); anschließend Projektion auf Minimum ≤ Ø ≤ Grenzzuschlag < Preisobergrenze. Aus den Punktprognosen wird die Verteilung gebaut (Ø-Bedingung stark gewichtet, Minimum als weicher Tail-Anker); die Grenzzuschlag-Unsicherheit folgt der Streuung der historischen Rundenänderungen."
auktion_letzte_gesetzt_beschreibung: "Die letzte Ausschreibung ({datum}) gilt als gesetzt: Grenzzuschlag {grenzzuschlag}, Ø {mittel}, Minimum {minimum}. Die Risikoneigung wählt das Quantil der Zuschlagswert-Verteilung dieser Runde."
auktion_risikoneigung_label: "Risikoneigung: gewünschte Wahrscheinlichkeit"
auktion_risikoneigung_hilfe: "Prognosemodell: Zuschlagswahrscheinlichkeit P(Grenzzuschlag > Gebot). Letzte Ausschreibung: Anteil der Zuschlagswerte der letzten Runde oberhalb des gewählten Werts – hohe Wahrscheinlichkeit = konservativ niedriger Wert."
auktion_ueberschreiben_label: "Zuschlagswert manuell überschreiben"
