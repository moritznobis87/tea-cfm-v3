auktion_dichte_beschreibung: "Gefüllt: Dichte der Zuschlagswerte (am Grenzzuschlag abgeschnitten) – Peak knapp unter dem Grenzzuschlag, steiler Abfall nach rechts, langsamer linker Auslauf. Gestrichelt: alle Gebote inkl. nicht bezuschlagter."
auktion_dichte_band_suffix: " Band: P10–P90 des prognostizierten Grenzzuschlags."
auktion_kurve_beschreibung_prognose: "Prognosemodell: P(Zuschlag | Gebot) = P(Grenzzuschlag > Gebot) über die Prognoseunsicherheit."
auktion_kurve_beschreibung_letzte: "Quantilslage in der gesetzten letzten Runde: Anteil der Zuschlagswerte oberhalb des gewählten Werts."
auktion_uebergabe_beschreibung: "Der empfohlene Wert wird neuen Projekten automatisch als EAG-Zuschlagswert vorbelegt (im Formular jederzeit manuell überschreibbar) und kann hier direkt in ein bestehendes Projekt übernommen werden. Im Monte-Carlo-Tab des Projekts lässt sich zusätzlich die volle Gebotsverteilung als Zufallsquelle aktivieren."
