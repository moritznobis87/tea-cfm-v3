# --- Globale Annahmen: vollständige Übersetzung -----------------------------------
annahmen_hinweis: "Gelten für alle Projekte, sofern nicht projektspezifisch überschrieben. Änderungen wirken sich erst nach „Speichern“ auf alle Projekte aus."
annahmen_szenarien_hinweis: "Kurven sind nach echtem Kalenderjahr indiziert. Je Projekt wird eines dieser Szenarien ausgewählt; das Kalenderjahr, ab dem die Kurve verwendet wird, ergibt sich aus dem Inbetriebnahmejahr des jeweiligen Projekts."
annahmen_inflation_marktwerte_titel: "**Inflationierung der Marktwerte**"
annahmen_inflation_marktwerte_hinweis: "Marktpreisstudien (Aurora/Enervis) liefern typischerweise reale Werte auf Preisbasis des Erscheinungsjahres, keine bereits inflationierten Nominalwerte. Für die Cashflow-Rechnung wird deshalb ein Inflationsaufschlag ab dem Basisjahr angewendet. Der EAG-Zuschlagswert ist davon nicht betroffen (bleibt gesetzlich nominal fix während der Förderdauer)."
annahmen_inflation_marktwerte_label: "Inflation Marktwerte (%/Jahr)"
annahmen_basisjahr_label: "Basisjahr der Kurven"
annahmen_basisjahr_hilfe: "Preisbasis-Jahr der Marktpreisstudie - ab diesem Jahr wird die Inflation aufgeschlagen."
annahmen_kosteninflation_label: "Kosteninflation (%/Jahr)"
annahmen_kosteninflation_hilfe: "Wirkt auf ALLE Kostenpositionen ohne eigene Preislogik: Pacht, Gemeindeabgabe und Direktvermarktungskosten (absoluter Modus) eskalieren damit ab dem 2. Betriebsjahr (Eingaben = Preisstand bei Inbetriebnahme). Die Standard-OPEX-Positionen tragen ihre eigene, unten einstellbare Indexierung (Vorbelegung ebenfalls 2 %/Jahr ab Jahr 1); Direktvermarktung im Relativ-Modus folgt bereits dem nominalen Marktwert."
annahmen_negative_stunden_gewichtung_titel: "**Gewichtung negativer Stunden**"
annahmen_negative_stunden_gewichtung_hinweis: "In Stunden negativer Strompreise entfällt gesetzlich die Marktprämie. 100 % = volle Wirkung wie in den Preiskurven hinterlegt. Niedrigere Werte blenden den Effekt teilweise oder ganz aus, z.B. für Vergleichsrechnungen ohne diesen Abschlag."
annahmen_gewichtung_label: "Gewichtung (%)"
annahmen_praemienentfall_titel: "**Regel für den Prämienentfall bei negativen Preisen**"
annahmen_praemienentfall_hinweis: "Die Zeitreihen der Szenarien geben die Erzeugungsmenge an, die in Zeiten negativer Preise anfällt - getrennt nach 6h-Regel (Prämie entfällt erst ab mindestens 6 Stunden am Stück negativer Preise) und 1h-Regel (bereits ab 1 Stunde am Stück). Standard in Österreich ist die 6h-Regel, in Deutschland die 1h-Regel."
annahmen_regel_6h: "6-Stunden-Regel (Österreich, Standard)"
annahmen_regel_1h: "1-Stunden-Regel (Deutschland)"
annahmen_regel_label: "Regel für negative Preise"
annahmen_verhalten_negativ_titel: "**Verhalten in Stunden negativer Preise**"
annahmen_modus_abregelung: "Erlöse entfallen vollständig – Anlage wird abgeregelt"
annahmen_modus_marktwert: "Rückfall auf Jahresmarktwert – keine Marktprämie, Anlage speist weiter ein"
annahmen_negativstunden_modus_label: "Negativstunden-Modus"
annahmen_negativstunden_modus_hilfe: "Abregelung: Für den Anteil negativer Stunden entfallen die Erlöse komplett. Rückfall auf Jahresmarktwert: Die Anlage speist weiter ein und erhält den Marktwert, nur die Marktprämie entfällt. Nach der Förderdauer wirkt der Unterschied nur noch im Abregelungs-Modus."
annahmen_erzeugung_negativ_hinweis: "Erzeugungsmenge neg. Stunden: Anteil der PV-Jahreserzeugung, der in Zeiten negativer Preise anfällt - je Regel (6h/1h) eine eigene Zeitreihe. Angewendet wird die oben gewählte Regel."
