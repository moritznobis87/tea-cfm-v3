auktion_dichte_beschreibung: "Relleno: densidad de los valores de adjudicación (truncada en el valor de adjudicación marginal) – pico justo por debajo del valor de adjudicación marginal, caída abrupta a la derecha, cola lenta a la izquierda. Discontinuo: todas las ofertas, incluidas las no adjudicadas."
auktion_dichte_band_suffix: " Banda: P10–P90 del valor de adjudicación marginal previsto."
auktion_kurve_beschreibung_prognose: "Modelo de previsión: P(adjudicación | oferta) = P(valor de adjudicación marginal > oferta) sobre la incertidumbre de la previsión."
auktion_kurve_beschreibung_letzte: "Posición cuantil en la última ronda fijada: proporción de valores de adjudicación por encima del valor elegido."
auktion_uebergabe_beschreibung: "El valor recomendado se aplica automáticamente a los nuevos proyectos como valor de adjudicación EAG por defecto (siempre sobrescribible manualmente en el formulario) y puede aplicarse aquí directamente a un proyecto existente. En la pestaña Monte Carlo del proyecto se puede activar además la distribución completa de ofertas como fuente aleatoria."
