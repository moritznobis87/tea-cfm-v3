auktion_intro_titel: "### Simulación de subasta EAG (fotovoltaica)"
auktion_intro_beschreibung: "Modelo de tomador de precios: estima la distribución de ofertas de los demás participantes del mercado en la próxima subasta de prima de mercado; la oferta propia no afecta al valor de adjudicación marginal y se elige en función de la distribución. Mecanismo: pay-as-bid con ordenación de ofertas por precio (EAG §§ 18 y ss., OeMAG)."
auktion_historie_beschreibung: "Las rondas hasta 04/2025 estuvieron infrasuscritas (valor de adjudicación más alto = precio máximo, las cantidades residuales quedaron sin adjudicar); desde 07/2025 hay competencia: el valor de adjudicación más alto se ha desligado del límite máximo, los valores de adjudicación bajan y se concentran – exactamente el patrón pay-as-bid descrito en la literatura sobre subastas."
auktion_verteilungen_beschreibung: "Dado que la OeMAG no publica ni las ofertas individuales ni los volúmenes de ofertas, los parámetros de distribución por ronda se estiman a partir de los agregados (media, mínimo). Claramente visible: en las rondas infrasuscritas (discontinuas), la masa se concentra en el precio máximo; con la competencia desde 07/2025, las distribuciones se desplazan hacia la izquierda y se concentran."
auktion_kalibrierung_titel: "**Calibración por ronda** (gamma inversa reflejada en [0, límite]; condiciones: valor de adjudicación medio ponderado y mínimo como cuantil del 2 %; para las rondas sobresuscritas, la tasa de sobresuscripción r = volumen de ofertas / cantidad licitada es **latente** y se estima a partir de la diferencia entre el valor de adjudicación marginal y el límite, ya que la OeMAG no publica el volumen de ofertas):"
auktion_modellwahl_titel: "Selección del modelo y validación (backtest)"
auktion_familienvergleich_text: "**Comparación de familias** – dado que solo se publican agregados (mín./media/máx.) por ronda, quedan descartados KDE/GMM sobre ofertas individuales; se comparan familias paramétricas acotadas a [0, límite]. Se elige la **distribución gamma inversa reflejada en el eje de ordenadas y desplazada al límite**: se ajusta mejor a las rondas competitivas (relevantes para la previsión) (RMSE de ajuste 0,15 frente a 0,21 de la beta) y tiene estructuralmente exactamente la forma esperada – densidad nula en el límite, caída abrupta a la derecha, cola izquierda que se atenúa lentamente. La beta se mantiene como referencia: describe mejor las rondas antiguas infrasuscritas con masa en el límite (β < 1), que la gamma inversa no puede representar por construcción; la normal truncada fracasa como base simétrica ante la cola izquierda combinada con la concentración (RMSE de ajuste ~4× mayor)."
auktion_backtest_intro: "**Backtest móvil de un paso** – para cada ronda competitiva, el modelo se calibró únicamente con las rondas anteriores (anclado a la última ronda respectiva, paseo aleatorio) y se predijo el valor de adjudicación marginal; comparación con la prolongación ingenua del último valor de adjudicación más alto (el enfoque anterior):"
auktion_backtest_hinweis: "RMSE del valor de adjudicación marginal en las cuatro rondas competitivas: modelo 0,60 frente a ingenuo 0,69 ct/kWh; en el régimen estable desde 2026: 0,23 frente a 0,36 ct/kWh. Además, solo el modelo ofrece la distribución predictiva completa del valor de adjudicación marginal, y con ello la probabilidad de adjudicación por oferta, que un valor puntual fijo no puede ofrecer en principio. Las filas más débiles de 2025 marcan el cambio de régimen (entrada de la competencia), que ningún método calibrado puramente con datos históricos podría haber anticipado."
auktion_grundlage_label: "Base del valor de adjudicación"
auktion_grundlage_letzte: "Última subasta (fijada)"
auktion_grundlage_prognose: "Modelo de previsión (próxima subasta)"
auktion_grundlage_hilfe: "Última subasta: la distribución de la última ronda se aplica sin cambios; la propensión al riesgo selecciona el cuantil de los valores de adjudicación. Modelo de previsión: previsión de momento para la próxima ronda – el valor de adjudicación marginal y medio se extrapolan a partir del último cambio y su aceleración, y a partir de ahí se construye la nueva distribución."
auktion_preisobergrenze_label: "Precio máximo (ct/kWh)"
auktion_preisobergrenze_hilfe: "Fijado por reglamento; 2026/2027: 7,77 ct/kWh."
auktion_differenzordnung_label: "Orden de diferencia máximo"
auktion_differenzordnung_hilfe: "Orden 1 = extrapolación lineal de la última tendencia; el orden 2 tiene en cuenta además el cambio de la tendencia (aceleración); el orden 3, su cambio. Limitado de forma efectiva por las rondas competitivas disponibles."
auktion_unsicherheit_label: "Incertidumbre del valor de adjudicación marginal (± ct/kWh)"
auktion_unsicherheit_hilfe: "Dispersión en torno a la previsión puntual; el valor por defecto corresponde a la dispersión de las variaciones históricas entre rondas. Truncada en el precio máximo."
auktion_daempfung_label: "Amortiguación λ{k} (peso de la diferencia de orden {k1})"
auktion_daempfung_hilfe: "λ = 1: prolongación completa de la diferencia superior; λ = 0: el orden superior se ignora (equivale al orden inferior respectivo)."
auktion_implizierte_quote: "Tasa de sobresuscripción implícita de la distribución construida: r = {wert} (proporción de ofertas adjudicadas = 1/r; se deriva del valor de adjudicación marginal previsto, la previsión media y el anclaje del mínimo)."
auktion_methodik_titel: "Metodología de previsión (extrapolación de diferencias)"
auktion_methodik_intro: "Extrapolación recursiva de diferencias múltiples: la diferencia más alta se mantiene constante, todas las inferiores se extrapolan de forma recursiva –"
auktion_methodik_erklaerung: "Con ello se tiene en cuenta no solo la tendencia actual, sino también su variación: si el descenso se reduce a la mitad en cada ronda, el método prevé un mayor aplanamiento en lugar de una extrapolación constante."
auktion_methodik_ergebnis: "Valor de adjudicación marginal: {maxes_kette} ⇒ **{grenzzuschlag_wert}** · Valor de adjudicación medio: {mittels_kette} ⇒ **{mittel_wert}**"
auktion_methodik_schluss: "El mínimo se prolonga sin cambios (sin dinámica estable en el historial); a continuación, el resultado se proyecta sobre mínimo ≤ media ≤ valor de adjudicación marginal < precio máximo. A partir de las previsiones puntuales se construye la distribución de la próxima ronda (la condición de la media fuertemente ponderada, el mínimo como anclaje suave de la cola); la incertidumbre del valor de adjudicación marginal sigue la dispersión de las variaciones históricas entre rondas."
auktion_letzte_gesetzt_beschreibung: "La última subasta ({datum}) se considera fijada: valor de adjudicación marginal {grenzzuschlag}, media {mittel}, mínimo {minimum}. La propensión al riesgo selecciona el cuantil de la distribución de valores de adjudicación de esa ronda."
auktion_risikoneigung_label: "Propensión al riesgo: probabilidad deseada"
auktion_risikoneigung_hilfe: "Modelo de previsión: probabilidad de adjudicación P(valor de adjudicación marginal > oferta). Última subasta: proporción de los valores de adjudicación de esa ronda por encima del valor elegido – probabilidad alta = valor prudentemente bajo."
auktion_ueberschreiben_label: "Sobrescribir manualmente el valor de adjudicación"
