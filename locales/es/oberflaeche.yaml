annahmen_hinweis: "Se aplican a todos los proyectos, salvo que se sobrescriban a nivel de proyecto. Los cambios solo surten efecto en todos los proyectos tras pulsar «Guardar»."
annahmen_szenarien_hinweis: "Las curvas están indexadas por año natural real. Cada proyecto selecciona uno de estos escenarios; el año natural a partir del cual se utiliza la curva se deriva del año de puesta en marcha del proyecto correspondiente."
annahmen_inflation_marktwerte_titel: "**Inflación de los valores de mercado**"
annahmen_inflation_marktwerte_hinweis: "Los estudios de precio de mercado (Aurora/Enervis) suelen aportar valores reales a base de precios de su año de publicación, no valores ya expresados en términos nominales. Por ello, el cálculo del flujo de caja aplica un recargo por inflación a partir del año base. El valor de adjudicación EAG no se ve afectado (permanece fijo en términos nominales por ley durante todo el periodo de apoyo)."
annahmen_inflation_marktwerte_label: "Inflación valores de mercado (%/año)"
annahmen_basisjahr_label: "Año base de las curvas"
annahmen_basisjahr_hilfe: "Año base de precios del estudio de precio de mercado - la inflación se añade a partir de este año."
annahmen_kosteninflation_label: "Inflación de costes (%/año)"
annahmen_kosteninflation_hilfe: "Se aplica a TODAS las partidas de coste sin lógica de precios propia: arrendamiento, tasa municipal y costes de venta directa (modo absoluto) se incrementan así a partir del 2.º año de explotación (las entradas corresponden al nivel de precios en la puesta en marcha). Las partidas OPEX estándar tienen su propia indexación, ajustable más abajo (valor por defecto también 2 %/año desde el año 1); la venta directa en modo relativo ya sigue el valor de mercado nominal."
annahmen_negative_stunden_gewichtung_titel: "**Ponderación de las horas negativas**"
annahmen_negative_stunden_gewichtung_hinweis: "Durante las horas de precios de electricidad negativos, la prima de mercado queda legalmente anulada. 100 % = efecto completo tal como figura en las curvas de precios. Valores más bajos ocultan el efecto parcial o totalmente, p. ej. para cálculos comparativos sin este descuento."
annahmen_gewichtung_label: "Ponderación (%)"
annahmen_praemienentfall_titel: "**Regla de supresión de la prima con precios negativos**"
annahmen_praemienentfall_hinweis: "Las series temporales de los escenarios indican la cantidad producida en periodos de precios negativos - por separado según la regla de 6h (la prima solo se anula a partir de 6 horas consecutivas de precios negativos) y la regla de 1h (ya desde 1 hora). El estándar en Austria es la regla de 6h, en Alemania la regla de 1h."
