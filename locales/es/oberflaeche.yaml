annahmen_negativstunden_modus_hilfe: "Limitación: los ingresos se pierden por completo en la proporción de horas negativas. Vuelta al valor de mercado anual: la instalación sigue inyectando y recibe el valor de mercado, solo se anula la prima de mercado. Tras el periodo de apoyo, la diferencia solo importa en el modo de limitación."
