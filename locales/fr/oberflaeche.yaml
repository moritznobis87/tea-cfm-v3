auktion_dichte_beschreibung: "Rempli : densité des valeurs d'attribution (tronquée à la valeur d'attribution marginale) – pic juste en dessous de la valeur d'attribution marginale, chute abrupte à droite, queue lente à gauche. Pointillés : toutes les offres, y compris non attribuées."
auktion_dichte_band_suffix: " Bande : P10–P90 de la valeur d'attribution marginale prévue."
auktion_kurve_beschreibung_prognose: "Modèle de prévision : P(attribution | offre) = P(valeur d'attribution marginale > offre) sur l'incertitude de prévision."
auktion_kurve_beschreibung_letzte: "Position quantile dans le dernier tour fixé : part des valeurs d'attribution au-dessus de la valeur choisie."
auktion_uebergabe_beschreibung: "La valeur recommandée est appliquée automatiquement aux nouveaux projets comme valeur d'attribution EAG par défaut (toujours modifiable manuellement dans le formulaire) et peut être appliquée ici directement à un projet existant. Dans l'onglet Monte-Carlo du projet, la distribution complète des offres peut en outre être activée comme source aléatoire."
