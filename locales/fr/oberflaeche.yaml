auktion_intro_titel: "### Simulation d'appel d'offres EAG (photovoltaïque)"
auktion_intro_beschreibung: "Modèle price-taker : estime la distribution des offres des autres participants au marché pour le prochain appel d'offres de prime de marché ; sa propre offre n'affecte pas la valeur d'attribution marginale et est choisie sur la base de la distribution. Mécanisme : pay-as-bid avec classement des offres par prix (EAG §§ 18 et suivants, OeMAG)."
auktion_historie_beschreibung: "Les tours jusqu'en 04/2025 étaient sous-souscrits (valeur d'attribution la plus élevée = prix plafond, quantités résiduelles non attribuées) ; depuis 07/2025, la concurrence règne : la valeur d'attribution la plus élevée se détache du plafond, les valeurs d'attribution baissent et se concentrent – exactement le schéma pay-as-bid décrit dans la littérature sur les enchères."
auktion_verteilungen_beschreibung: "Comme l'OeMAG ne publie ni les offres individuelles ni les volumes d'offres, les paramètres de distribution par tour sont estimés à partir des agrégats (moyenne, minimum). Nettement visible : dans les tours sous-souscrits (pointillés), la masse colle au prix plafond ; avec la concurrence à partir de 07/2025, les distributions se déplacent vers la gauche et se concentrent."
auktion_kalibrierung_titel: "**Calibration par tour** (gamma inverse reflétée sur [0, plafond] ; conditions : valeur d'attribution moyenne pondérée et minimum comme quantile à 2 % ; pour les tours sursouscrits, le taux de sursouscription r = volume d'offres / quantité mise en appel d'offres est **latent** et est estimé à partir de l'écart valeur d'attribution marginale ↔ plafond, car l'OeMAG ne publie pas le volume d'offres) :"
auktion_modellwahl_titel: "Choix du modèle et validation (backtest)"
auktion_familienvergleich_text: "**Comparaison des familles** – comme seuls des agrégats (min/moy./max) sont publiés par tour, KDE/GMM sur les offres individuelles sont exclus ; sont comparées des familles paramétriques bornées à [0, plafond]. Est retenue la **distribution gamma inverse reflétée à l'axe des ordonnées et décalée au plafond** : elle s'ajuste le mieux aux tours concurrentiels (pertinents pour la prévision) (RMSE d'ajustement 0,15 contre 0,21 pour la bêta) et présente structurellement exactement la forme attendue – densité nulle au plafond, chute abrupte à droite, queue gauche s'estompant lentement. La bêta reste une référence : elle décrit mieux les anciens tours sous-souscrits avec masse au plafond (β < 1), que la gamma inverse ne peut représenter par construction ; la loi normale tronquée échoue en tant que base symétrique face à la queue gauche combinée à la concentration (RMSE d'ajustement ~4× plus élevé)."
auktion_backtest_intro: "**Backtest glissant à un pas** – pour chaque tour concurrentiel, le modèle a été calibré uniquement sur les tours précédents (ancré sur le dernier tour respectif, marche aléatoire) et la valeur d'attribution marginale prévue ; comparaison avec la reconduction naïve de la dernière valeur d'attribution la plus élevée (approche précédente) :"
auktion_backtest_hinweis: "RMSE de la valeur d'attribution marginale sur les quatre tours concurrentiels : modèle 0,60 contre naïf 0,69 ct/kWh ; dans le régime stable à partir de 2026 : 0,23 contre 0,36 ct/kWh. En outre, seul le modèle fournit la distribution prédictive complète de la valeur d'attribution marginale – et donc la probabilité d'attribution par offre, qu'une valeur ponctuelle fixe ne peut fournir par principe. Les lignes plus faibles de 2025 marquent le changement de régime (entrée en concurrence), qu'aucune méthode calibrée purement sur l'historique n'aurait pu anticiper."
auktion_grundlage_label: "Base de la valeur d'attribution"
auktion_grundlage_letzte: "Dernier appel d'offres (fixé)"
auktion_grundlage_prognose: "Modèle de prévision (prochain appel d'offres)"
auktion_grundlage_hilfe: "Dernier appel d'offres : la distribution du dernier tour s'applique sans changement ; l'appétence au risque sélectionne le quantile des valeurs d'attribution. Modèle de prévision : prévision de momentum pour le prochain tour – la valeur d'attribution marginale et moyenne sont extrapolées à partir de la dernière variation et de son accélération, la nouvelle distribution est construite à partir de là."
auktion_preisobergrenze_label: "Prix plafond (ct/kWh)"
auktion_preisobergrenze_hilfe: "Fixé par voie réglementaire ; 2026/2027 : 7,77 ct/kWh."
auktion_differenzordnung_label: "Ordre de différence maximal"
auktion_differenzordnung_hilfe: "Ordre 1 = extrapolation linéaire de la dernière tendance ; l'ordre 2 tient compte en plus de la variation de la tendance (accélération) ; l'ordre 3 de sa variation. Effectivement limité par les tours concurrentiels disponibles."
auktion_unsicherheit_label: "Incertitude de la valeur d'attribution marginale (± ct/kWh)"
auktion_unsicherheit_hilfe: "Dispersion autour de la prévision ponctuelle ; la valeur par défaut correspond à la dispersion des variations historiques d'un tour à l'autre. Tronquée au prix plafond."
auktion_daempfung_label: "Amortissement λ{k} (poids de la différence d'ordre {k1})"
auktion_daempfung_hilfe: "λ = 1 : report intégral de la différence supérieure ; λ = 0 : l'ordre supérieur est ignoré (équivaut à l'ordre inférieur respectif)."
auktion_implizierte_quote: "Taux de sursouscription implicite de la distribution construite : r = {wert} (part des offres attribuées = 1/r ; découle de la prévision de valeur d'attribution marginale, de la prévision moyenne et de l'ancrage du minimum)."
auktion_methodik_titel: "Méthodologie de prévision (extrapolation des différences)"
auktion_methodik_intro: "Extrapolation récursive des différences multiples : la différence la plus élevée reste constante, toutes les différences inférieures sont extrapolées récursivement –"
auktion_methodik_erklaerung: "Cela tient compte non seulement de la tendance actuelle, mais aussi de sa variation : si la baisse se réduit de moitié à chaque tour, la méthode anticipe un nouvel aplatissement plutôt qu'une extrapolation constante."
auktion_methodik_ergebnis: "Valeur d'attribution marginale : {maxes_kette} ⇒ **{grenzzuschlag_wert}** · Valeur d'attribution moyenne : {mittels_kette} ⇒ **{mittel_wert}**"
auktion_methodik_schluss: "Le minimum est reconduit sans changement (aucune dynamique stable dans l'historique) ; le résultat est ensuite projeté sur minimum ≤ moyenne ≤ valeur d'attribution marginale < prix plafond. La distribution du prochain tour est construite à partir des prévisions ponctuelles (la condition de moyenne fortement pondérée, le minimum servant d'ancrage souple pour la queue) ; l'incertitude de la valeur d'attribution marginale suit la dispersion des variations historiques d'un tour à l'autre."
auktion_letzte_gesetzt_beschreibung: "Le dernier appel d'offres ({datum}) est considéré comme fixé : valeur d'attribution marginale {grenzzuschlag}, moyenne {mittel}, minimum {minimum}. L'appétence au risque sélectionne le quantile de la distribution des valeurs d'attribution de ce tour."
auktion_risikoneigung_label: "Appétence au risque : probabilité souhaitée"
auktion_risikoneigung_hilfe: "Modèle de prévision : probabilité d'attribution P(valeur d'attribution marginale > offre). Dernier appel d'offres : part des valeurs d'attribution de ce tour au-dessus de la valeur choisie – probabilité élevée = valeur prudemment basse."
