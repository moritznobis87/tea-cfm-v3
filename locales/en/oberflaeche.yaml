annahmen_inflation_marktwerte_titel: "**Inflating market values**"
annahmen_inflation_marktwerte_hinweis: "Market price studies (Aurora/Enervis) typically supply real values at the price basis of their publication year, not values already inflated to nominal terms. The cashflow calculation therefore applies an inflation markup from the base year onward. The EAG award value is unaffected (remains fixed in nominal terms by law throughout the support period)."
