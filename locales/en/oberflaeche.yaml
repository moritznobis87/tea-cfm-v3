annahmen_basisjahr_label: "Base year of the curves"
annahmen_basisjahr_hilfe: "Price-basis year of the market price study - inflation is added from this year onward."
annahmen_kosteninflation_label: "Cost inflation (%/year)"
annahmen_kosteninflation_hilfe: "Applies to ALL cost items without their own pricing logic: lease, municipal levy and direct marketing costs (absolute mode) escalate from the 2nd operating year onward (inputs = price level at commissioning). The standard OPEX items carry their own indexation, adjustable below (default likewise 2 %/year from year 1); direct marketing in relative mode already tracks the nominal market value."
annahmen_negative_stunden_gewichtung_titel: "**Weighting of negative-price hours**"
annahmen_negative_stunden_gewichtung_hinweis: "During hours of negative electricity prices, the market premium is legally void. 100 % = full effect as stored in the price curves. Lower values partially or fully suppress the effect, e.g. for comparison calculations without this discount."
annahmen_gewichtung_label: "Weighting (%)"
annahmen_praemienentfall_titel: "**Rule for premium loss during negative prices**"
annahmen_praemienentfall_hinweis: "The scenario time series state the generation volume falling in periods of negative prices - separately by 6h rule (premium lapses only after at least 6 consecutive hours of negative prices) and 1h rule (already after 1 hour). Austria's standard is the 6h rule, Germany's the 1h rule."
annahmen_regel_6h: "6-hour rule (Austria, default)"
annahmen_regel_1h: "1-hour rule (Germany)"
annahmen_regel_label: "Rule for negative prices"
annahmen_verhalten_negativ_titel: "**Behaviour during hours of negative prices**"
