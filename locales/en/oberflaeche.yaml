auktion_intro_titel: "### EAG auction simulation (photovoltaics)"
auktion_intro_beschreibung: "Price-taker model: estimates the bid distribution of the other market participants in the next market premium auction; the own bid does not affect the marginal award value and is chosen based on the distribution. Mechanism: pay-as-bid with price-ranked bidding (EAG §§ 18 ff., OeMAG)."
auktion_historie_beschreibung: "Rounds through 04/2025 were undersubscribed (highest award value = price cap, residual volumes went unawarded); since 07/2025 there has been competition: the highest award value has decoupled from the cap, award values are falling and concentrating – exactly the pay-as-bid pattern described in the auction literature."
auktion_verteilungen_beschreibung: "Since OeMAG publishes neither individual bids nor bid volumes, the distribution parameters per round are estimated from the aggregates (avg., minimum). Clearly visible: in the undersubscribed rounds (dashed), mass clings to the price cap; with competition from 07/2025 onward, the distributions shift left and concentrate."
auktion_kalibrierung_titel: "**Calibration per round** (mirrored inverse gamma on [0, cap]; conditions: volume-weighted avg. award value and minimum as 2 % quantile; for oversubscribed rounds the oversubscription ratio r = bid volume / tendered volume is **latent** and is back-estimated from the gap between marginal award value and cap, since OeMAG does not publish the bid volume):"
auktion_modellwahl_titel: "Model choice and validation (backtest)"
auktion_familienvergleich_text: "**Family comparison** – since only aggregates (min/avg/max) are published per round, KDE/GMM on individual bids are ruled out; compared instead are parametric families bounded to [0, cap]. Chosen is the **inverse-gamma distribution mirrored at the y-axis and shifted to the cap**: it fits the (forecast-relevant) competitive rounds best (fit RMSE 0.15 vs. 0.21 for the beta) and structurally has exactly the expected shape – density zero at the cap, steep drop to the right, slowly tapering left tail. The beta remains as a reference: it better describes the old, undersubscribed rounds with mass at the cap (β < 1), which the inverse gamma cannot represent by construction; the truncated normal distribution fails as a symmetric basis given the left tail plus concentration (fit RMSE ~4× higher)."
auktion_backtest_intro: "**Rolling one-step backtest** – for each competitive round, the model was calibrated only on the preceding rounds (anchored to the respective latest round, random walk) and the marginal award value forecast; compared against the naive carry-forward of the last highest award value (the previous approach):"
auktion_backtest_hinweis: "RMSE of the marginal award value across all four competitive rounds: model 0.60 vs. naive 0.69 ct/kWh; in the stable regime from 2026: 0.23 vs. 0.36 ct/kWh. Beyond that, only the model delivers the full predictive distribution of the marginal award value – and therefore the award probability per bid, which a fixed point value cannot provide in principle. The weaker rows in 2025 mark the regime shift (onset of competition), which no purely historically calibrated method could have anticipated."
auktion_grundlage_label: "Basis for the award value"
auktion_grundlage_letzte: "Last auction (fixed)"
auktion_grundlage_prognose: "Forecast model (next auction)"
auktion_grundlage_hilfe: "Last auction: the distribution of the last round applies unchanged; the risk preference selects the quantile of award values. Forecast model: momentum forecast for the next round – marginal and average award value are extrapolated from the latest change and its acceleration, and the new distribution is built from that."
auktion_preisobergrenze_label: "Price cap (ct/kWh)"
auktion_preisobergrenze_hilfe: "Fixed by ordinance; 2026/2027: 7.77 ct/kWh."
auktion_differenzordnung_label: "Maximum difference order"
auktion_differenzordnung_hilfe: "Order 1 = linear extrapolation of the latest trend; order 2 additionally accounts for the change in trend (acceleration); order 3 for its change. Effectively limited by the available competitive rounds."
auktion_unsicherheit_label: "Uncertainty of the marginal award value (± ct/kWh)"
auktion_unsicherheit_hilfe: "Spread around the point forecast; default corresponds to the spread of historical round-to-round changes. Truncated at the price cap."
auktion_daempfung_label: "Damping λ{k} (weight of the order-{k1} difference)"
auktion_daempfung_hilfe: "λ = 1: full carry-forward of the higher difference; λ = 0: the higher order is ignored (equivalent to the respective lower order)."
auktion_implizierte_quote: "Implied oversubscription ratio of the constructed distribution: r = {wert} (share of awarded bids = 1/r; follows from the forecast marginal award value, average forecast and minimum anchor)."
auktion_methodik_titel: "Forecast methodology (difference extrapolation)"
auktion_methodik_intro: "Recursive multi-order difference extrapolation: the highest difference stays constant, all lower ones are extrapolated recursively –"
auktion_methodik_erklaerung: "This accounts not only for the current trend but also for its change: if the decline halves each round, the method expects further flattening rather than a constant extrapolation."
auktion_methodik_ergebnis: "Marginal award value: {maxes_kette} ⇒ **{grenzzuschlag_wert}** · Avg. award value: {mittels_kette} ⇒ **{mittel_wert}**"
auktion_methodik_schluss: "The minimum is carried forward unchanged (no stable dynamics in the history); the result is then projected onto minimum ≤ average ≤ marginal award value < price cap. The distribution for the next round is built from the point forecasts (the average condition weighted heavily, the minimum serving as a soft tail anchor); the marginal-award-value uncertainty follows the spread of historical round-to-round changes."
auktion_letzte_gesetzt_beschreibung: "The last auction ({datum}) is treated as fixed: marginal award value {grenzzuschlag}, avg. {mittel}, minimum {minimum}. The risk preference selects the quantile of that round's award-value distribution."
auktion_risikoneigung_label: "Risk preference: desired probability"
auktion_risikoneigung_hilfe: "Forecast model: award probability P(marginal award value > bid). Last auction: share of that round's award values above the chosen value – higher probability = conservatively lower value."
